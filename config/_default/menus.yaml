# Navigation Links
#   To link a page section, specify the URL as a hash `/#` followed by the `id` of the section.
#   The `weight` parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /
    weight: 10
    name: Info
    url: /#info
    weight: 20
  - name: Skills
    url: /#skills
    weight: 30
  - name: Project
    url: /#graduation-project
    weight: 40
  - name: Resources
    weight: 50
    hasChildren: true
  - parent: Resources
    name: Blog
    url: blog/

# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: dark
  color: indigo

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: '전북대 문유빈의 개발블로그'
    # twitter: 'GetResearchDev'
    image: "logo.png"
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    align: "center"
    fixed_to_top: true
    logo:
      # text: "YUBIN"
      # Logo filename in `assets/media/` folder
      filename: "logo.png"
    # button:
    #   enable: true
    #   text: "Get Started"
    #   url: "https://hugoblox.com/templates/"
    show_search: true
    show_theme_chooser: true
  favicon:
    filename: "logo.png"

# Site footer
footer:
  copyright:
    notice: '© {year} MOON YUBIN'

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
